name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [release-please]
    if: needs.release-please.outputs.releases_created == 'true'
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: ./.github/actions/setup-node-pnpm
        with:
          registry-url: 'https://registry.npmjs.org'
      - name: Download build-tools artifact
        uses: actions/download-artifact@v4
        with:
          name: physics3d-build-tools
          path: packages/physics3d/build-tools/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download physics3d wasm/bvh artifact
        uses: actions/download-artifact@v4
        with:
          name: physics3d-wasm-bvh
          path: packages/physics3d/wasm/bvh/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download physics3d-fracture wasm artifact
        uses: actions/download-artifact@v4
        with:
          name: physics3d-fracture-wasm
          path: packages/physics3d-fracture/wasm/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download core wasm artifact
        uses: actions/download-artifact@v4
        with:
          name: core-wasm
          path: packages/core/wasm/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: pnpm build:ts
      - name: Publish to npm
        run: pnpm -r publish --access public --no-git-checks --provenance
